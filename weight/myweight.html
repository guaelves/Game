<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>減重記錄 App</title>
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    padding: 10px;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 6px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

th {
    background: #4CAF50;
    color: white;
}

input {
    width: 70px;
    text-align: center;
}

.green { color: green; }
.red { color: red; }

.small {
    font-size: 12px;
    color: #666;
}

button {
    padding: 6px 10px;
    margin: 5px;
}
</style>
</head>

<body>

<h2>📉 減重記錄 App</h2>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <button onclick="saveData()">💾 儲存</button>
</div>

<div class="card">
<table id="table">
<thead>
<tr>
    <th>週</th>
    <th>日期</th>
    <th>目標</th>
    <th>目前</th>
    <th>差異</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
let data = [
["第0週","4/1",65.5,""],
["第1週","4/7",64.8,63.4],
["第2週","4/14",64.0,64.5],
["第3週","4/21",63.3,64.1],
["第4週","4/28",62.6,""],
["第5週","5/5",61.9,""],
["第6週","5/12",61.2,""],
["第7週","5/19",60.5,""],
["第8週","5/26",59.8,""],
["第9週","6/2",59.1,""],
["第10週","6/9",58.4,""],
["第11週","6/16",57.7,""],
["第12週","6/23",57.0,""],
["第13週","6/30",56.3,""],
["第14週","7/7",55.8,""],
["第15週","7/14",55.3,""],
["第16週","7/21",54.8,""],
["第17週","7/28",54.3,""],
["第18週","8/4",53.8,""],
["第19週","8/11",53.3,""],
["第20週","8/18",52.8,""],
["第21週","8/25",52.3,""],
["第22週","8/31",51.5,""]
];

function load(){
    let saved = localStorage.getItem("weightApp");
    if(saved) data = JSON.parse(saved);

    let tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    let labels = [];
    let weights = [];

    data.forEach((r,i)=>{
        let diff = "";
        let cls = "";

        if(r[3] !== "" && r[3] !== undefined){
            diff = (r[3] - r[2]).toFixed(1);

            if(diff < 0){
                cls = "green";
                diff = "▼ " + diff;
            } else {
                cls = "red";
                diff = "▲ +" + diff;
            }
        }

        labels.push(r[1]);
        weights.push(r[3] || null);

        let targetDiff = "";
        if(r[3]){
            targetDiff = (r[3] - r[2]).toFixed(1);
        }

        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r[0]}</td>
            <td>${r[1]}</td>
            <td>${r[2]} kg</td>
            <td><input value="${r[3]||''}" onchange="update(${i},this.value)"></td>
            <td class="${cls}">${targetDiff?targetDiff:''}</td>
        `;
        tbody.appendChild(tr);
    });

    drawChart(labels, weights);
}

function update(i,val){
    data[i][3] = val ? parseFloat(val) : "";
    saveData();
    load();
}

function saveData(){
    localStorage.setItem("weightApp",JSON.stringify(data));
}

function drawChart(labels,weights){
    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:"體重變化",
                data:weights,
                borderColor:"#4CAF50",
                spanGaps:true,
                tension:0.3
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{display:false}
            },
            scales:{
                y:{reverse:false}
            }
        }
    });
}

load();
</script>

</body>
</html>
