<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週期減重記錄</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
    padding:10px;
}

.card{
    background:white;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 🔥 表格外層（手機可滑動） */
.table-wrap{
    overflow-x:auto;
}

/* 🔥 表格核心優化 */
table{
    width:95%;
    table-layout:fixed;
    border-collapse:collapse;
    font-size:14px;
    min-width:420px; /* 防止過窄 */
}

th,td{
    border-bottom:1px solid #eee;
    text-align:center;
    padding:6px;
    white-space:nowrap; /* ❗不換行 */
}

th{
    background:#4CAF50;
    color:white;
}

/* 🔥 欄位比例 */
th:nth-child(1), td:nth-child(1){ width:5%; }
th:nth-child(2), td:nth-child(2){ width:30%; }
th:nth-child(3), td:nth-child(3){ width:15%; }
th:nth-child(4), td:nth-child(4){ width:20%; }
th:nth-child(5), td:nth-child(5){ width:15%; }

/* 🔥 input 不撐爆 */
td input{
    width:95%;
    box-sizing:border-box;
    padding:4px;
}

.green{ color:green; }
.red{ color:red; }

canvas{
    max-height:260px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">📉 週期減重規劃系統</h2>

<div class="card">
<h3>👤 基本資料</h3>

身高(cm) <input id="h"><br>
起始體重(kg) <input id="w"><br>
年齡 <input id="a"><br><br>

📅 起始日期 <input type="date" id="startD"><br>
🎯 目標體重(kg) <input id="goalW"><br>
📅 目標日期 <input type="date" id="goalD"><br><br>

<button onclick="generate()">生成週計畫</button>

<div id="info"></div>
</div>

<div class="card">
<h3>📊 體重變化</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 每週減重追蹤</h3>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>週次</th>
<th>日期</th>
<th>目標</th>
<th>實際</th>
<th>差異</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let plan = [];
let chart;

startD.valueAsDate = new Date();
goalD.valueAsDate = new Date();

window.onload = function(){
    let data = JSON.parse(localStorage.getItem("fatloss"));
    if(!data) return;

    ["h","w","a","startD","goalW","goalD"].forEach(id=>{
        if(data[id]) document.getElementById(id).value = data[id];
    });

    if(data.plan){
        plan = data.plan;
        renderTable();
        drawChart();
    }
};

function save(){
    localStorage.setItem("fatloss", JSON.stringify({
        h:h.value,w:w.value,a:a.value,
        startD:startD.value,
        goalW:goalW.value,
        goalD:goalD.value,
        plan
    }));
}

function formatDate(d){
    return d.toISOString().slice(0,10).replace(/-/g,"/");
}

function addDays(date,days){
    let d=new Date(date);
    d.setDate(d.getDate()+days);
    return d;
}

function generate(){

    let H=+h.value;
    let W=+w.value;
    let A=+a.value;

    let startDate=new Date(startD.value);
    let goalWeight=+goalW.value;
    let goalDate=new Date(goalD.value);

    let bmi=W/((H/100)**2);
    let bmr=10*W+6.25*H-5*A-161;
    let tdee=bmr*1.375;

    info.innerHTML=`
    📊 BMI：${bmi.toFixed(1)}<br>
    🔥 BMR：${bmr.toFixed(0)} kcal<br>
    ⚡ TDEE：${tdee.toFixed(0)} kcal`;

    buildTable(startDate,W,goalWeight,goalDate);
}

function buildTable(startDate,startWeight,target,goalDate){

    table.innerHTML="";
    plan=[];

    let weeks=Math.ceil((goalDate-startDate)/(1000*60*60*24)/7);
    let loss=startWeight-target;
    let weekly=loss/weeks;

    let w=startWeight;

    for(let i=0;i<=weeks;i++){

        let t=(i===0)?w:(w-=weekly);

        plan.push({
            week:i,
            date:formatDate(addDays(startDate,i*7)),
            target:t.toFixed(1),
            actual:(i===0?startWeight:"")
        });
    }

    renderTable();
    drawChart();
    save();
}

function renderTable(){

    table.innerHTML="";

    plan.forEach((r,i)=>{

        let diff="-";

        if(i===0) diff="0.0";
        else if(r.actual!==""){
            let d=(r.actual-r.target).toFixed(1);
            diff=d<0?`<span class=green>▼${d}</span>`:`<span class=red>▲+${d}</span>`;
        }

        table.innerHTML+=`
        <tr>
        <td>${r.week}</td>
        <td>${r.date}</td>
        <td>${r.target}</td>
        <td><input value="${r.actual}" onchange="update(${i},this.value)"></td>
        <td id="d${i}">${diff}</td>
        </tr>`;
    });
}

function update(i,v){

    plan[i].actual=v?parseFloat(v):"";

    let d=plan[i].actual-plan[i].target;

    document.getElementById("d"+i).innerHTML =
        v ? (d<0?`<span class=green>▼${d.toFixed(1)}</span>`:`<span class=red>▲+${d.toFixed(1)}</span>`) : "-";

    save();
    drawChart();
}

function drawChart(){

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels:plan.map(p=>"W"+p.week),
            datasets:[
                {label:'目標',data:plan.map(p=>p.target),borderColor:'blue'},
                {label:'實際',data:plan.map(p=>p.actual||null),borderColor:'red'}
            ]
        }
    });
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
