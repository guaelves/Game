<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週期減重記錄</title>
<!-- App Icon -->
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
    
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
    padding:10px;
}

.card{
    background:white;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
    padding:6px;
    width:120px;
    margin:4px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

th,td{
    border-bottom:1px solid #eee;
    text-align:center;
    padding:6px;
}

th{
    background:#4CAF50;
    color:white;
}

.green{ color:green; }
.red{ color:red; }

canvas{
    max-height:260px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">📉 週期減重規劃系統</h2>

<div class="card">
<h3>👤 基本資料</h3>

身高(cm) <input id="h"><br>
起始體重(kg) <input id="w"><br>
年齡 <input id="a"><br><br>

📅 起始日期 <input type="date" id="startD"><br>
🎯 目標體重(kg) <input id="goalW"><br>
📅 目標日期 <input type="date" id="goalD"><br><br>

<button onclick="generate()">生成週計畫</button>

<div id="info"></div>
</div>

<div class="card">
<h3>📊 體重變化</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 每週減重追蹤</h3>

<table>
<thead>
<tr>
<th>週次</th>
<th>日期</th>
<th>目標</th>
<th>實際</th>
<th>差異</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

let plan = [];
let chart;

// 預設今天
document.getElementById("startD").valueAsDate = new Date();
document.getElementById("goalD").valueAsDate = new Date();

// ===== 載入資料 =====
window.onload = function(){

    let data = JSON.parse(localStorage.getItem("fatloss"));

    if(!data) return;

    // 還原基本資料
    ["h","w","a","startD","goalW","goalD"].forEach(id=>{
        if(data[id]){
            document.getElementById(id).value = data[id];
        }
    });

    // ⭐ 還原整個計畫（關鍵）
    if(data.plan && data.plan.length){

        plan = data.plan;
        renderTable();
        drawChart();

    } else {
        generate();
    }
};

// ===== 儲存 =====
function save(){
    let data = {
        h: document.getElementById("h").value,
        w: document.getElementById("w").value,
        a: document.getElementById("a").value,
        startD: document.getElementById("startD").value,
        goalW: document.getElementById("goalW").value,
        goalD: document.getElementById("goalD").value,
        plan: plan
    };
    localStorage.setItem("fatloss", JSON.stringify(data));
}

// ===== 工具 =====
function formatDate(d){
    let y = d.getFullYear();
    let m = String(d.getMonth()+1).padStart(2,'0');
    let day = String(d.getDate()).padStart(2,'0');
    return `${y}/${m}/${day}`;
}

function addDays(date,days){
    let d = new Date(date);
    d.setDate(d.getDate()+days);
    return d;
}

// ===== 生成 =====
function generate(){

    let h = +document.getElementById("h").value;
    let w = +document.getElementById("w").value;
    let a = +document.getElementById("a").value;

    let startDate = new Date(document.getElementById("startD").value);
    let goalWeight = +document.getElementById("goalW").value;
    let goalDate = new Date(document.getElementById("goalD").value);

    let bmi = w / ((h/100)**2);
    let bmr = 10*w + 6.25*h - 5*a - 161;

    let tdee = bmr * 1.375;
    let suggest = tdee - 500;

    document.getElementById("info").innerHTML = `
        📊 BMI：${bmi.toFixed(1)}<br>
        🔥 BMR：${bmr.toFixed(0)} kcal<br>
        ⚡ TDEE：${tdee.toFixed(0)} kcal<br>
        🍽️ 建議攝取：${suggest.toFixed(0)} kcal
    `;

    buildTable(startDate, w, goalWeight, goalDate);
}

// ===== 建表 =====
function buildTable(startDate, startWeight, target, goalDate){

    let tbody = document.getElementById("table");
    tbody.innerHTML = "";
    plan = [];

    let totalDays = (goalDate - startDate) / (1000*60*60*24);
    let weeks = Math.ceil(totalDays / 7);

    if(weeks <= 0){
        alert("目標日期需大於起始日");
        return;
    }

    let totalLoss = startWeight - target;

    if(totalLoss <= 0){
        alert("目標體重需小於起始體重");
        return;
    }

    let weeklyLoss = totalLoss / weeks;

    if(weeklyLoss > 0.7){
        alert(`⚠️ 每週需減重 ${weeklyLoss.toFixed(2)} kg，過難`);
        return;
    }

    let weight = startWeight;

    for(let week=0; week<=weeks; week++){

        let date = addDays(startDate, week*7);
        let targetWeight = (week===0)? startWeight : (weight -= weeklyLoss);

        plan.push({
            week,
            date: formatDate(date),
            target: targetWeight.toFixed(1),
            actual: (week===0 ? startWeight : "")
        });
    }

    renderTable();
    drawChart();
    save(); // ⭐ 生成後存
}

// ===== 渲染表格（共用）=====
function renderTable(){

    let tbody = document.getElementById("table");
    tbody.innerHTML = "";

    plan.forEach((r,i)=>{

        let diffText = "-";

        if(i === 0){
            diffText = "0.0 (起始)";
        }else if(r.actual !== ""){
            let d = (r.actual - r.target).toFixed(1);
            diffText = d < 0
                ? `<span class="green">▼ ${d}</span>`
                : `<span class="red">▲ +${d}</span>`;
        }

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>第${r.week}週</td>
            <td>${r.date}</td>
            <td>${r.target} kg</td>
            <td>
                <input value="${r.actual}" onchange="update(${i},this.value)">
            </td>
            <td id="diff${i}">${diffText}</td>
        `;

        tbody.appendChild(tr);
    });
}

// ===== 更新 =====
function update(i,val){

    plan[i].actual = val ? parseFloat(val) : "";

    let diffCell = document.getElementById("diff"+i);

    if(plan[i].actual !== ""){
        let d = (plan[i].actual - plan[i].target).toFixed(1);

        diffCell.innerHTML =
            d < 0
            ? `<span class="green">▼ ${d}</span>`
            : `<span class="red">▲ +${d}</span>`;
    } else {
        diffCell.innerHTML = "-";
    }

    save();      // ⭐ 每次輸入都存
    drawChart();
}

// ===== 圖表 =====
function drawChart(){

    let labels = plan.map(p=>`W${p.week}`);
    let targetData = plan.map(p=>p.target);
    let actualData = plan.map(p=>p.actual || null);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: '目標',
                    data: targetData,
                    borderColor: 'blue',
                    fill:false
                },
                {
                    label: '實際',
                    data: actualData,
                    borderColor: 'red',
                    fill:false
                }
            ]
        }
    });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
